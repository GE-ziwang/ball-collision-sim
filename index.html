<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一维多球碰撞模拟器 - 修复暂停版</title>
    <style>
        * {
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        
        body {
            background: #fff;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 顶部控制栏 */
        .control-bar {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: #f8f8f8;
            border-bottom: 1px solid #e0e0e0;
            gap: 15px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .control-label {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
        }
        
        .control-input {
            width: 70px;
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            background: #fff;
        }
        
        .control-unit {
            font-size: 13px;
            color: #666;
        }
        
        .btn {
            padding: 6px 14px;
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #e8e8e8;
        }
        
        .btn-primary {
            background: #e3f2fd;
            border-color: #90caf9;
            color: #1565c0;
        }
        
        .btn-success {
            background: #e8f5e9;
            border-color: #a5d6a7;
            color: #2e7d32;
        }
        
        .btn-danger {
            background: #ffebee;
            border-color: #ef9a9a;
            color: #c62828;
        }
        
        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 选中球控制器 */
        .selected-ball-controls {
            display: none;
            align-items: center;
            gap: 15px;
            padding-left: 20px;
            border-left: 1px solid #ddd;
            margin-left: 10px;
        }
        
        .selected-ball-controls.show {
            display: flex;
        }
        
        .selected-ball-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }
        
        /* 速度显示栏 */
        .speed-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            background: #f0f0f0;
            border-bottom: 1px solid #e0e0e0;
            gap: 30px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        
        .speed-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .speed-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .speed-text {
            font-size: 14px;
            font-weight: 500;
        }
        
        /* 画布区域 */
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
            background: #fff;
            min-height: 0; /* 关键：防止被压缩 */
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* 底部信息栏 */
        .info-bar {
            display: flex;
            justify-content: space-between;
            padding: 8px 20px;
            background: #f8f8f8;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #888;
            flex-shrink: 0;
        }
        
        .info-item {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .selected-ball-info {
            background: #e3f2fd;
            padding: 4px 8px;
            border-radius: 4px;
            color: #1565c0;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .control-bar {
                padding: 10px;
                gap: 10px;
            }
            
            .control-input {
                width: 60px;
            }
            
            .speed-bar {
                flex-direction: column;
                gap: 10px;
                padding: 8px 10px;
            }
            
            .selected-ball-controls {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding-left: 0;
                border-left: none;
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 控制栏 -->
    <div class="control-bar">
        <!-- 核心控制组 -->
        <div class="control-group">
            <span class="control-label">恢复系数 e:</span>
            <input type="number" id="restitution" min="0" max="1" step="0.05" value="1" class="control-input">
            <span class="control-unit">(0-1)</span>
        </div>
        
        <!-- 开始/暂停按钮 -->
        <button class="btn btn-primary" id="toggleBtn">开始</button>
        
        <!-- 小球操作按钮 -->
        <button class="btn btn-success" id="addBallBtn">添加小球</button>
        <button class="btn" id="clearBallsBtn">清空小球</button>
        <button class="btn" id="autoZoomBtn">自动缩放: 开</button>
        
        <!-- 选中球控制器 -->
        <div class="selected-ball-controls" id="selectedBallControls">
            <div class="selected-ball-title">选中小球设置</div>
            <div class="control-group">
                <span class="control-label">质量:</span>
                <input type="number" id="selectedMass" min="0.1" max="100" step="0.1" value="5" class="control-input">
                <span class="control-unit">kg</span>
            </div>
            <div class="control-group">
                <span class="control-label">速度:</span>
                <input type="number" id="selectedVel" min="-50" max="50" step="0.1" value="0" class="control-input">
                <span class="control-unit">m/s</span>
            </div>
        </div>
    </div>
    
    <!-- 速度显示栏 -->
    <div class="speed-bar" id="speedBar">
        <!-- 动态生成小球速度显示 -->
    </div>
    
    <!-- 画布区域 -->
    <div class="canvas-container" id="canvasContainer">
        <canvas id="canvas"></canvas>
    </div>
    
    <!-- 底部信息 -->
    <div class="info-bar">
        <div class="info-item">
            <span>小球数量: <span id="ballCount">2</span></span>
            <span>总碰撞: <span id="collisionCount">0</span></span>
            <span>总动量: <span id="momentum">0</span> kg·m/s</span>
            <span>总动能: <span id="energy">0</span> J</span>
            <span>缩放: <span id="zoom">1.0</span>x</span>
        </div>
        <div class="info-item">
            <div id="selectedBallInfo" class="selected-ball-info" style="display: none;">
                选中小球: 动量 0 kg·m/s, 动能 0 J
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        const selectedBallControls = document.getElementById('selectedBallControls');
        const selectedBallInfo = document.getElementById('selectedBallInfo');
        const selectedMassInput = document.getElementById('selectedMass');
        const selectedVelInput = document.getElementById('selectedVel');
        const addBallBtn = document.getElementById('addBallBtn');
        const clearBallsBtn = document.getElementById('clearBallsBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const autoZoomBtn = document.getElementById('autoZoomBtn');
        
        let animId = null;
        let running = false;
        let collisions = 0;
        let autoZoomEnabled = true;
        let selectedBall = null;
        let isDraggingBall = false; // 是否正在拖动小球
        let isDraggingCanvas = false; // 是否正在拖动画布
        let lastX = 0, lastY = 0;
        
        // 物理常数
        const PIXELS_PER_METER = 10;
        const BALL_RADIUS = 30; // 统一小球半径
        
        // 视图
        let offsetX = 0;
        let offsetY = 0;
        let scale = 1;
        
        // 小球数组
        let balls = [];
        
        // 预定义颜色
        const ballColors = [
            '#f44336', // 红
            '#2196f3', // 蓝
            '#4caf50', // 绿
            '#ff9800', // 橙
            '#9c27b0', // 紫
            '#00bcd4', // 青
            '#ffeb3b', // 黄
            '#795548'  // 棕
        ];
        
        // 初始化两个小球
        function initBalls() {
            balls = [
                {
                    x: -200, y: 0, r: BALL_RADIUS,
                    mass: 5, vel: 3,
                    color: ballColors[0],
                    id: 1
                },
                {
                    x: 200, y: 0, r: BALL_RADIUS,
                    mass: 10, vel: -2,
                    color: ballColors[1],
                    id: 2
                }
            ];
        }
        
        // 添加新小球（固定在0位置，速度为0，统一半径）
        function addBall() {
            if (balls.length >= 8) {
                alert('最多只能添加8个小球！');
                return;
            }
            
            const colorsUsed = balls.map(b => b.color);
            let availableColor = ballColors.find(c => !colorsUsed.includes(c)) || ballColors[balls.length % ballColors.length];
            
            const newBall = {
                x: 0, // 固定在0位置
                y: 0,
                r: BALL_RADIUS, // 使用统一半径
                mass: 1 + Math.random() * 9, // 随机质量
                vel: 0, // 速度为0
                color: availableColor,
                id: balls.length + 1
            };
            
            balls.push(newBall);
            updateSpeedDisplay();
            updateBallCount();
        }
        
        // 清空所有小球
        function clearBalls() {
            if (balls.length > 0) {
                balls = [];
                collisions = 0;
                updateSpeedDisplay();
                updateBallCount();
                deselectBall();
                if (!running) draw();
            }
        }
        
        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
                
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(scale, scale);
            ctx.translate(offsetX, offsetY);
                
            // 绘制x轴
            drawXAxis();
                
            // 绘制所有小球
            balls.forEach(ball => {
                drawBall(ball);
                drawPositionLabel(ball);
            });
                
            ctx.restore();
        }
        
        function drawXAxis() {
            const axisY = 80;
                
            ctx.beginPath();
            ctx.moveTo(-10000, axisY);
            ctx.lineTo(10000, axisY);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.stroke();
                
            // 刻度
            let meterInterval = 10;
            if (scale < 0.5) meterInterval = 50;
            else if (scale < 1) meterInterval = 20;
            else if (scale > 2) meterInterval = 5;
            else if (scale > 4) meterInterval = 1;
                
            const pixelInterval = meterInterval * PIXELS_PER_METER;
            const visibleLeft = (-canvas.width/2/scale - offsetX);
            const visibleRight = (canvas.width/2/scale - offsetX);
            const firstTick = Math.ceil(visibleLeft / pixelInterval) * pixelInterval;
                
            ctx.font = `${12/scale}px Arial`;
            ctx.fillStyle = '#666';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
                
            for (let x = firstTick; x < visibleRight; x += pixelInterval) {
                if (Math.abs(x) < 0.1) continue;
                    
                ctx.beginPath();
                ctx.moveTo(x, axisY - 5);
                ctx.lineTo(x, axisY + 5);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.stroke();
                    
                const meterValue = x / PIXELS_PER_METER;
                ctx.fillText(`${meterValue.toFixed(0)}m`, x, axisY + 8);
            }
                
            // 原点
            ctx.beginPath();
            ctx.moveTo(0, axisY - 8);
            ctx.lineTo(0, axisY + 8);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();
                
            ctx.font = `${14/scale}px Arial`;
            ctx.fillStyle = '#333';
            ctx.fillText("0m", 0, axisY + 10);
        }
        
        function drawBall(ball) {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fillStyle = ball.color;
            ctx.fill();
                
            // 边框
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.strokeStyle = selectedBall === ball ? '#000' : 'rgba(0,0,0,0.1)';
            ctx.lineWidth = selectedBall === ball ? 3 : 1;
            ctx.stroke();
                
            // 如果是选中的小球，显示ID
            if (selectedBall === ball) {
                ctx.font = `${14/scale}px Arial`;
                ctx.fillStyle = '#000';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(ball.id.toString(), ball.x, ball.y);
            }
        }
        
        function drawPositionLabel(ball) {
            ctx.font = `${14/scale}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
                
            const posMeters = ball.x / PIXELS_PER_METER;
            ctx.fillStyle = ball.color;
            ctx.fillText(`x=${posMeters.toFixed(1)}m`, ball.x, ball.y - ball.r - 15);
        }
        
        function updateSpeedDisplay() {
            const speedBar = document.getElementById('speedBar');
            speedBar.innerHTML = '';
                
            balls.forEach(ball => {
                const speedItem = document.createElement('div');
                speedItem.className = 'speed-item';
                speedItem.innerHTML = `
                    <div class="speed-color" style="background: ${ball.color};"></div>
                    <span class="speed-text">球${ball.id}: ${ball.vel.toFixed(1)} m/s (${ball.mass.toFixed(1)}kg)</span>
                `;
                speedBar.appendChild(speedItem);
            });
        }
        
        function updateBallCount() {
            document.getElementById('ballCount').textContent = balls.length;
        }
        
        function selectBall(ball) {
            selectedBall = ball;
            selectedBallControls.classList.add('show');
            selectedMassInput.value = ball.mass.toFixed(1);
            selectedVelInput.value = ball.vel.toFixed(1);
            updateSelectedBallInfo();
        }
        
        function deselectBall() {
            selectedBall = null;
            selectedBallControls.classList.remove('show');
            selectedBallInfo.style.display = 'none';
        }
        
        function updateSelectedBallInfo() {
            if (selectedBall) {
                const momentum = selectedBall.mass * selectedBall.vel;
                const energy = 0.5 * selectedBall.mass * selectedBall.vel * selectedBall.vel;
                selectedBallInfo.innerHTML = `选中小球${selectedBall.id}: 动量 ${momentum.toFixed(2)} kg·m/s, 动能 ${energy.toFixed(2)} J`;
                selectedBallInfo.style.display = 'block';
            }
        }
        
        // 检查点是否在小球内（修复缩放后的选取问题）
        function isPointInBall(x, y, ball) {
            // 将世界坐标转换为画布坐标进行比较
            const screenX = (ball.x + offsetX) * scale + canvas.width/2;
            const screenY = (ball.y + offsetY) * scale + canvas.height/2;
                
            // 计算鼠标点击位置与小球中心的屏幕距离
            const dx = x - screenX;
            const dy = y - screenY;
            const distance = Math.sqrt(dx*dx + dy*dy);
                
            // 将小球半径转换为屏幕像素单位
            const screenRadius = ball.r * scale;
                
            return distance <= screenRadius;
        }
        
        function update() {
            const timeStep = 1/60;
            const e = parseFloat(document.getElementById('restitution').value);
                
            // 更新位置
            balls.forEach(ball => {
                ball.x += ball.vel * timeStep * PIXELS_PER_METER;
            });
                
            // 碰撞检测
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const ball1 = balls[i];
                    const ball2 = balls[j];
                        
                    const dist = Math.abs(ball1.x - ball2.x);
                    const minDist = ball1.r + ball2.r;
                        
                    if (dist < minDist) {
                        collisions++;
                        document.getElementById('collisionCount').textContent = collisions;
                            
                        // 碰撞响应（带恢复系数）
                        const v1 = ball1.vel;
                        const v2 = ball2.vel;
                        const m1 = ball1.mass;
                        const m2 = ball2.mass;
                            
                        ball1.vel = ((m1 - e * m2) * v1 + (1 + e) * m2 * v2) / (m1 + m2);
                        ball2.vel = ((m2 - e * m1) * v2 + (1 + e) * m1 * v1) / (m1 + m2);
                            
                        // 防止重叠
                        const overlap = minDist - dist;
                            
                        // 根据小球的位置关系调整
                        if (ball1.x < ball2.x) {
                            // ball1在左，ball2在右
                            const ratio = m2 / (m1 + m2);
                            ball1.x -= overlap * ratio;
                            ball2.x += overlap * (1 - ratio);
                        } else {
                            // ball1在右，ball2在左
                            const ratio = m1 / (m1 + m2);
                            ball1.x += overlap * ratio;
                            ball2.x -= overlap * (1 - ratio);
                        }
                    }
                }
            }
                
            // 更新物理数据
            let totalMomentum = 0;
            let totalEnergy = 0;
                
            balls.forEach(ball => {
                totalMomentum += ball.mass * ball.vel;
                totalEnergy += 0.5 * ball.mass * ball.vel * ball.vel;
            });
                
            document.getElementById('momentum').textContent = totalMomentum.toFixed(1);
            document.getElementById('energy').textContent = totalEnergy.toFixed(1);
            document.getElementById('zoom').textContent = scale.toFixed(1);
                
            // 更新速度显示
            updateSpeedDisplay();
                
            // 更新选中小球信息
            updateSelectedBallInfo();
                
            // 自动缩放
            if (autoZoomEnabled && balls.length > 0) {
                smartAutoZoom();
            }
        }
        
        function smartAutoZoom() {
            let minX = Infinity, maxX = -Infinity;
                
            balls.forEach(ball => {
                minX = Math.min(minX, ball.x - ball.r);
                maxX = Math.max(maxX, ball.x + ball.r);
            });
                
            const ballsWidth = maxX - minX;
            if (ballsWidth < 1) {
                scale = 1;
                offsetX = 0;
                return;
            }
                
            const marginPercent = 0.15;
            const availableWidth = canvas.width * (1 - 2 * marginPercent);
            let newScale = availableWidth / ballsWidth;
            newScale = Math.max(0.2, Math.min(5, newScale));
                
            const smoothingFactor = 0.1;
            scale += (newScale - scale) * smoothingFactor;
                
            const centerX = (minX + maxX) / 2;
            const targetOffsetX = -centerX;
            offsetX += (targetOffsetX - offsetX) * smoothingFactor;
            offsetY = 0;
        }
        
        function animate() {
            update();
            draw();
            animId = requestAnimationFrame(animate);
        }
        
        function toggleSimulation() {
            console.log('Toggle simulation, current running:', running); // 调试用
            if (running) {
                // 停止动画
                cancelAnimationFrame(animId);
                animId = null;
                toggleBtn.textContent = '开始';
                // 暂停时允许操作
                enableBallOperations();
                container.style.cursor = 'grab';
            } else {
                // 开始动画
                if (!animId) {
                    animate();
                }
                toggleBtn.textContent = '暂停';
                // 运行时禁止操作小球，但允许移动画布
                disableBallOperations();
                container.style.cursor = 'grab';
                deselectBall();
            }
            running = !running;
        }
        
        function toggleAutoZoom() {
            autoZoomEnabled = !autoZoomEnabled;
            autoZoomBtn.textContent = `自动缩放: ${autoZoomEnabled ? '开' : '关'}`;
                
            if (autoZoomEnabled) {
                autoZoomBtn.classList.add('btn-success');
                autoZoomBtn.classList.remove('btn-danger');
            } else {
                autoZoomBtn.classList.remove('btn-success');
                autoZoomBtn.classList.add('btn-danger');
            }
        }
        
        function enableBallOperations() {
            addBallBtn.disabled = false;
            clearBallsBtn.disabled = false;
            selectedMassInput.disabled = false;
            selectedVelInput.disabled = false;
                
            addBallBtn.classList.remove('btn-disabled');
            clearBallsBtn.classList.remove('btn-disabled');
            selectedMassInput.classList.remove('btn-disabled');
            selectedVelInput.classList.remove('btn-disabled');
        }
        
        function disableBallOperations() {
            addBallBtn.disabled = true;
            clearBallsBtn.disabled = true;
            selectedMassInput.disabled = true;
            selectedVelInput.disabled = true;
                
            addBallBtn.classList.add('btn-disabled');
            clearBallsBtn.classList.add('btn-disabled');
            selectedMassInput.classList.add('btn-disabled');
            selectedVelInput.classList.add('btn-disabled');
        }
        
        // 事件绑定
        function setup() {
            resize();
            initBalls();
            updateSpeedDisplay();
            updateBallCount();
                
            // 控制按钮
            toggleBtn.addEventListener('click', toggleSimulation);
            addBallBtn.addEventListener('click', addBall);
            clearBallsBtn.addEventListener('click', clearBalls);
            autoZoomBtn.addEventListener('click', toggleAutoZoom);
                
            // 选中球的质量速度控制器
            selectedMassInput.addEventListener('input', function() {
                if (selectedBall && !running) {
                    selectedBall.mass = parseFloat(this.value);
                    if (isNaN(selectedBall.mass) || selectedBall.mass <= 0) {
                        selectedBall.mass = 1;
                    }
                    updateSpeedDisplay();
                    updateSelectedBallInfo();
                }
            });
                
            selectedVelInput.addEventListener('input', function() {
                if (selectedBall && !running) {
                    selectedBall.vel = parseFloat(this.value);
                    if (isNaN(selectedBall.vel)) {
                        selectedBall.vel = 0;
                    }
                    updateSpeedDisplay();
                    updateSelectedBallInfo();
                }
            });
                
            // 鼠标事件 - 拖动画布或小球
            container.addEventListener('mousedown', e => {
                const rect = container.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                    
                // 检查是否点击了小球（仅在暂停时）
                if (!running) {
                    // 遍历所有小球，检查是否被点击
                    for (let i = balls.length - 1; i >= 0; i--) {
                        const ball = balls[i];
                        if (isPointInBall(mouseX, mouseY, ball)) {
                            // 左键点击小球，选中并准备拖动
                            if (e.button === 0) {
                                selectBall(ball);
                                isDraggingBall = true;
                                container.style.cursor = 'grabbing';
                                e.preventDefault(); // 防止默认行为
                                return;
                            }
                        }
                    }
                }
                    
                // 没有点击小球，开始拖动视图
                isDraggingCanvas = true;
                lastX = e.clientX;
                lastY = e.clientY;
                container.style.cursor = 'grabbing';
            });
                
            container.addEventListener('mousemove', e => {
                const rect = container.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                    
                if (isDraggingBall && selectedBall && !running) {
                    // 拖动选中的小球 - 修复坐标转换
                    const worldX = (mouseX - canvas.width/2 - offsetX * scale) / scale;
                    selectedBall.x = worldX;
                    updateSelectedBallInfo();
                } else if (isDraggingCanvas) {
                    // 拖动视图
                    offsetX += (e.clientX - lastX)/scale;
                    offsetY += (e.clientY - lastY)/scale;
                    lastX = e.clientX;
                    lastY = e.clientY;
                }
                    
                draw();
            });
                
            container.addEventListener('mouseup', () => {
                isDraggingBall = false;
                isDraggingCanvas = false;
                container.style.cursor = running ? 'grab' : (selectedBall ? 'pointer' : 'grab');
            });
                
            container.addEventListener('mouseleave', () => {
                isDraggingBall = false;
                isDraggingCanvas = false;
                container.style.cursor = running ? 'grab' : (selectedBall ? 'pointer' : 'grab');
            });
                
            // 阻止右键菜单
            container.addEventListener('contextmenu', e => {
                e.preventDefault();
            });
                
            // 滚轮缩放
            container.addEventListener('wheel', e => {
                e.preventDefault();
                const factor = e.deltaY < 0 ? 1.1 : 0.9;
                const oldScale = scale;
                scale *= factor;
                scale = Math.max(0.2, Math.min(5, scale));
                    
                // 以鼠标为中心缩放
                const rect = container.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                    
                const worldX = (mouseX - canvas.width/2 - offsetX * oldScale) / oldScale;
                const worldY = (mouseY - canvas.height/2 - offsetY * oldScale) / oldScale;
                    
                offsetX = (mouseX - canvas.width/2 - worldX * scale) / scale;
                offsetY = (mouseY - canvas.height/2 - worldY * scale) / scale;
                    
                // 手动缩放时暂时禁用自动缩放
                autoZoomEnabled = false;
                autoZoomBtn.textContent = '自动缩放: 关';
                autoZoomBtn.classList.remove('btn-success');
                autoZoomBtn.classList.add('btn-danger');
                    
                draw();
            }, { passive: false });
                
            window.addEventListener('resize', resize);
            draw();
        }
        
        setup();
    </script>
</body>
</html>
